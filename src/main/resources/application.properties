# --- Application Metadata ---
spring.application.name=ApexBid

# --- Database Configuration (PostgreSQL) ---
# Default fallback credentials point to localhost for native execution
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/apexbid_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:vaibhav_admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# --- JPA / Hibernate Settings ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Schema Initialization Control ---
# Dynamically controlled via Docker environment blocks to avoid multi-instance execution collisions
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}

# --- Cache Configuration (Redis) ---
# Default fallback host points to localhost for native execution
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# --- Logging ---
logging.level.org.springframework=INFO
logging.level.org.vaibhav.apexbid=DEBUG